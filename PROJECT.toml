# Single source of truth for project identity/branding, referenced by
# README.md, docs/, and the Mini App footer via {{project.*}} tokens -
# see open-source-project-structure.md §2. Application code never reads
# this file; it's a docs/branding concern only, kept separate from
# pyproject.toml (the Python package's own metadata) and config.py
# (runtime configuration).
#
# Fill these in before publishing. Nothing here is required for the
# project to build or run.

